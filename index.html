<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Mobile Web App Meta Tags -->
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <title>IHS Enrollment Tracker</title>
    
    <!-- Google Fonts for Old English style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Compiles JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- html2pdf for Advanced Rich Text PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
      @keyframes shimmer { 100% { transform: translateX(100%); } }
      .animate-shimmer { animation: shimmer 2s infinite; }
      body { -webkit-font-smoothing: antialiased; }
      /* Hide scrollbar for mobile navigation */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body class="bg-slate-100 font-sans text-slate-800 min-h-screen">
    
    <div id="root"></div>

    <!-- Firebase Modules Loading -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
      import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
      
      // Expose Firebase tools to the global window for React to use
      window.FirebaseAPI = {
        initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
        getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc
      };
      
      // Tell React that Firebase is ready
      window.dispatchEvent(new Event('firebase-loaded'));
    </script>

    <!-- React Application Code -->
    <script type="text/babel">
      const { useState, useEffect } = React;

      // ==========================================
      // SVG ICON UTILITY
      // ==========================================
      const Icon = ({ name, className = "", size = 24, title }) => {
        const icons = {
          GraduationCap: <path d="M22 10v6M2 10l10-5 10 5-10 5zM6 12v5c0 2 2 3 6 3s6-1 6-3v-5" />,
          CheckCircle2: <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM9 12l2 2 4-4" />,
          Circle: <circle cx="12" cy="12" r="10" />,
          LogOut: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />,
          Plus: <path d="M12 5v14M5 12h14" />,
          Trash2: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" />,
          Users: <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />,
          Settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 1.94l-.15 1.57a8.03 8.03 0 0 1-1.39.8l-1.44-.65a2 2 0 0 0-2.31.54l-1.25 1.25a2 2 0 0 0-.54 2.31l.65 1.44a8.03 8.03 0 0 1-.8 1.39l-1.57.15A2 2 0 0 0 2 11.78v.44a2 2 0 0 0 1.94 2l1.57.15c.19.53.43 1.04.8 1.39l-.65 1.44a2 2 0 0 0 .54 2.31l1.25 1.25a2 2 0 0 0 2.31.54l1.44-.65c.49.37.99.61 1.39.8l.15 1.57A2 2 0 0 0 11.78 22h.44a2 2 0 0 0 2-1.94l.15-1.57c.53-.19 1.04-.43 1.39-.8l1.44.65a2 2 0 0 0 2.31-.54l1.25-1.25a2 2 0 0 0 .54-2.31l-.65-1.44c.37-.49.61-.99.8-1.39l1.57-.15A2 2 0 0 0 22 12.22v-.44a2 2 0 0 0-1.94-2l-1.57-.15a8.03 8.03 0 0 1-.8-1.39l.65-1.44a2 2 0 0 0-.54-2.31l-1.25-1.25a2 2 0 0 0-2.31-.54l-1.44.65a8.03 8.03 0 0 1-1.39-.8l-.15-1.57A2 2 0 0 0 12.22 2zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />,
          ChevronRight: <path d="M9 18l6-6-6-6" />,
          BookOpen: <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />,
          User: <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" />,
          AlertCircle: <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 8v4M12 16h.01" />,
          Award: <g><path d="M12 15c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5z"/><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.11" /></g>,
          Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />,
          Upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
          X: <path d="M18 6L6 18M6 6l12 12" />,
          Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z" />,
          Image: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M21 8.5V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3.5M10.5 8.5a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM21 15l-5-5L5 21" />,
          Share: <g><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></g>
        };
        return (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {title && <title>{title}</title>}
            {icons[name]}
          </svg>
        );
      };

      // ==========================================
      // RICH TEXT EDITOR COMPONENT
      // ==========================================
      const RichTextEditor = ({ value, onChange }) => {
        const editorRef = React.useRef(null);

        useEffect(() => {
          if (editorRef.current && editorRef.current.innerHTML !== value) {
            editorRef.current.innerHTML = value || '';
          }
        }, []);

        const handleInput = () => {
          onChange(editorRef.current.innerHTML);
        };

        const execCmd = (cmd, arg = null, e) => {
          e.preventDefault();
          document.execCommand(cmd, false, arg);
          editorRef.current.focus();
          handleInput();
        };

        const applyCustomFontSize = (e) => {
          e.preventDefault();
          const size = e.target.value;
          if (!size) return;
          
          document.execCommand("fontSize", false, "7");
          
          const fonts = editorRef.current.getElementsByTagName("font");
          for (let i = 0; i < fonts.length; i++) {
              if (fonts[i].size == "7") {
                  fonts[i].removeAttribute("size");
                  fonts[i].style.fontSize = size;
              }
          }
          
          const spans = editorRef.current.getElementsByTagName("span");
          for (let i = 0; i < spans.length; i++) {
              if (spans[i].style.fontSize.includes("xxx-large") || spans[i].style.fontSize === "48px") {
                  spans[i].style.fontSize = size;
              }
          }
          
          editorRef.current.focus();
          handleInput();
          e.target.value = ""; 
        };

        return (
          <div className="border border-slate-300 rounded-lg overflow-hidden flex flex-col bg-white">
            <div className="bg-slate-100 p-2 flex flex-wrap gap-2 border-b border-slate-300 items-center">
              <button onMouseDown={(e) => execCmd('bold', null, e)} className="px-2 py-1 hover:bg-slate-200 rounded font-bold border border-transparent hover:border-slate-300">B</button>
              <button onMouseDown={(e) => execCmd('italic', null, e)} className="px-2 py-1 hover:bg-slate-200 rounded italic border border-transparent hover:border-slate-300">I</button>
              <button onMouseDown={(e) => execCmd('underline', null, e)} className="px-2 py-1 hover:bg-slate-200 rounded underline border border-transparent hover:border-slate-300">U</button>
              <div className="w-px h-5 bg-slate-300 mx-1 hidden sm:block"></div>
              <select onChange={(e) => execCmd('fontName', e.target.value, e)} className="text-sm bg-white border border-slate-300 rounded px-2 py-1 outline-none max-w-[120px] sm:max-w-full">
                <option value="Times New Roman">Times New Roman</option>
                <option value="Arial">Arial</option>
                <option value="Arial Black">Arial Black</option>
                <option value="UnifrakturMaguntia">Old English</option>
                <option value="Courier New">Courier New</option>
              </select>
              
              <select onChange={applyCustomFontSize} className="text-sm bg-white border border-slate-300 rounded px-2 py-1 outline-none" title="Numerical Font Size">
                <option value="">Size...</option>
                <option value="8px">8</option>
                <option value="10px">10</option>
                <option value="11px">11</option>
                <option value="12px">12</option>
                <option value="14px">14</option>
                <option value="16px">16</option>
                <option value="18px">18</option>
                <option value="20px">20</option>
                <option value="24px">24</option>
                <option value="28px">28</option>
                <option value="32px">32</option>
                <option value="36px">36</option>
                <option value="48px">48</option>
                <option value="72px">72</option>
              </select>
              
              <div className="w-px h-5 bg-slate-300 mx-1 hidden sm:block"></div>
              <div className="flex gap-1">
                <button onMouseDown={(e) => execCmd('justifyLeft', null, e)} className="px-2 py-1 hover:bg-slate-200 rounded text-xs">Left</button>
                <button onMouseDown={(e) => execCmd('justifyCenter', null, e)} className="px-2 py-1 hover:bg-slate-200 rounded text-xs">Center</button>
                <button onMouseDown={(e) => execCmd('justifyFull', null, e)} className="px-2 py-1 hover:bg-slate-200 rounded text-xs">Justify</button>
              </div>
            </div>
            <div 
              ref={editorRef}
              contentEditable
              onBlur={handleInput}
              className="p-4 min-h-[200px] outline-none font-serif text-[15px] leading-relaxed overflow-x-auto max-w-full"
            ></div>
          </div>
        );
      };

      // ==========================================
      // BOOTSTRAP WRAPPER
      // ==========================================
      function AppWrapper() {
        const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(!!window.FirebaseAPI);

        useEffect(() => {
          if (isFirebaseLoaded) return;
          const handleLoad = () => setIsFirebaseLoaded(true);
          window.addEventListener('firebase-loaded', handleLoad);
          return () => window.removeEventListener('firebase-loaded', handleLoad);
        }, [isFirebaseLoaded]);

        if (!isFirebaseLoaded) {
          return (
             <div className="min-h-screen flex items-center justify-center">
                <div className="animate-pulse text-blue-800 font-medium">Initializing Tracker...</div>
             </div>
          );
        }

        return <MainApp />;
      }

      // ==========================================
      // MAIN APP LOGIC
      // ==========================================
      const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'ihs-tracker-app';
      const DEFAULT_STEPS = [
        { id: 'step_1', text: 'Submit Application Form' },
        { id: 'step_2', text: 'Provide Previous Academic Records' },
        { id: 'step_3', text: 'Attend Admissions Interview' },
        { id: 'step_4', text: 'Pay Enrollment Fee' },
        { id: 'step_5', text: 'Receive Class Schedule' }
      ];

      // !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
      // ADMIN: REPLACE THIS CONFIG WITH YOUR OWN
      // !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
      const userFirebaseConfig = {
        apiKey: "AIzaSyDTdjusgcks4NCrcpMkX3Lu4NVMjYsp99o",
        authDomain: "ihs-enrollment-tracker.firebaseapp.com",
        projectId: "ihs-enrollment-tracker",
        storageBucket: "ihs-enrollment-tracker.firebasestorage.app",
        messagingSenderId: "748669937245",
        appId: "1:748669937245:web:64d66a0b962207de238fb4"
      };

      const isPreviewEnvironment = typeof __firebase_config !== 'undefined';
      const firebaseConfig = isPreviewEnvironment ? JSON.parse(__firebase_config) : userFirebaseConfig;

      function MainApp() {
        const [firebaseUser, setFirebaseUser] = useState(null);
        const [authError, setAuthError] = useState('');
        
        // App State
        const [role, setRole] = useState(null); 
        const [loggedInUsername, setLoggedInUsername] = useState('');
        const [globalSteps, setGlobalSteps] = useState([]);
        const [clients, setClients] = useState([]);
        const [certTemplate, setCertTemplate] = useState(null);
        const [isLoading, setIsLoading] = useState(true);

        const isConfigured = isPreviewEnvironment || firebaseConfig.apiKey !== "YOUR_API_KEY";
        const {
          getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
          getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc
        } = window.FirebaseAPI;

        const getFirebaseApp = () => {
          if (!window._appInstance) {
            try {
              window._appInstance = window.FirebaseAPI.initializeApp(firebaseConfig);
            } catch (e) {}
          }
          return window._appInstance;
        };

        useEffect(() => {
          if (!isConfigured) {
            setIsLoading(false);
            return;
          }

          const app = getFirebaseApp();
          const auth = getAuth(app);
          
          const initAuth = async () => {
            try {
              if (isPreviewEnvironment && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
              } else {
                await signInAnonymously(auth);
              }
            } catch (err) {
              console.error("Auth Error:", err);
              setAuthError("Failed to connect to the database.");
              setIsLoading(false);
            }
          };
          initAuth();

          const unsubscribe = onAuthStateChanged(auth, (user) => {
            setFirebaseUser(user);
            if (!user) setIsLoading(false);
          });

          return () => unsubscribe();
        }, [isConfigured]);

        useEffect(() => {
          if (!firebaseUser || !isConfigured) return;

          const app = getFirebaseApp();
          const db = getFirestore(app);

          const settingsRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'settings');
          const unsubSettings = onSnapshot(settingsRef, (snapshot) => {
            let foundGlobal = false;
            snapshot.forEach((docSnap) => {
              if (docSnap.id === 'global') {
                setGlobalSteps(docSnap.data().steps || []);
                foundGlobal = true;
              } else if (docSnap.id === 'certificate') {
                setCertTemplate(docSnap.data() || null); 
              }
            });
            if (!foundGlobal) {
              setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'global'), { steps: DEFAULT_STEPS });
            }
          }, (err) => console.error("Settings Sync Error:", err));

          const enrollmentsRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'enrollments');
          const unsubEnrollments = onSnapshot(enrollmentsRef, (snapshot) => {
            const clientsData = [];
            snapshot.forEach((docSnap) => {
              clientsData.push({ id: docSnap.id, ...docSnap.data() });
            });
            clientsData.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            setClients(clientsData);
            setIsLoading(false);
          }, (err) => {
            console.error("Enrollment Sync Error:", err);
            setIsLoading(false);
          });

          return () => {
            unsubSettings();
            unsubEnrollments();
          };
        }, [firebaseUser, isConfigured]);

        const handleLogin = (username) => {
          const cleanUsername = username.trim();
          if (cleanUsername === 'IHS_Admin') {
            setRole('admin');
            setLoggedInUsername('IHS_Admin');
            return true;
          }
          const client = clients.find(c => c.username === cleanUsername);
          if (client) {
            setRole('client');
            setLoggedInUsername(cleanUsername);
            return true;
          }
          return false;
        };

        const handleLogout = () => {
          setRole(null);
          setLoggedInUsername('');
        };

        if (!isConfigured) {
          return (
            <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
              <div className="bg-white rounded-xl shadow-xl p-8 max-w-lg w-full text-center border-t-4 border-red-500">
                <Icon name="AlertCircle" size={48} className="text-red-500 mx-auto mb-4" />
                <h1 className="text-2xl font-bold text-slate-800 mb-2">Configuration Required</h1>
                <p className="text-slate-600 mb-6">
                  Before the app can run, you must replace the <code>firebaseConfig</code> object in the Google Apps Script <code>Index.html</code> file with your actual project keys.
                </p>
              </div>
            </div>
          );
        }

        if (isLoading) {
          return (
            <div className="min-h-screen flex items-center justify-center">
              <div className="animate-pulse flex flex-col items-center">
                <Icon name="GraduationCap" size={48} className="text-blue-800 mb-4" />
                <p className="text-blue-800 font-medium">Loading IHS Portal...</p>
              </div>
            </div>
          );
        }

        return (
          <div>
            {!role && <LoginScreen onLogin={handleLogin} authError={authError} />}
            {role === 'admin' && (
              <AdminPortal 
                clients={clients} 
                globalSteps={globalSteps}
                certTemplate={certTemplate}
                onLogout={handleLogout}
                db={getFirestore(getFirebaseApp())} 
              />
            )}
            {role === 'client' && (
              <ClientPortal 
                client={clients.find(c => c.username === loggedInUsername)} 
                globalSteps={globalSteps} 
                onLogout={handleLogout} 
              />
            )}
          </div>
        );
      }

      // ==========================================
      // LOGIN SCREEN
      // ==========================================
      function LoginScreen({ onLogin, authError }) {
        const [username, setUsername] = useState('');
        const [error, setError] = useState('');

        const handleSubmit = (e) => {
          e.preventDefault();
          setError('');
          if (!username.trim()) {
            setError('Please enter a username');
            return;
          }
          const success = onLogin(username);
          if (!success) {
            setError('Username not found. Please check with the administration.');
          }
        };

        return (
          <div className="min-h-screen flex items-start justify-center p-4 pt-12 md:pt-24">
            <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
              <div className="bg-blue-900 p-8 text-center">
                <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-yellow-400 mb-4 shadow-lg">
                  <Icon name="GraduationCap" size={32} className="text-blue-900" />
                </div>
                <h1 className="text-2xl font-bold text-white tracking-wide">IRAYA HIGH SCHOOL</h1>
                <p className="text-blue-200 mt-2 text-sm">Enrollment Tracking Portal</p>
              </div>
              
              <div className="p-8">
                {(error || authError) && (
                  <div className="mb-6 p-3 bg-red-50 text-red-700 text-sm rounded-lg flex items-start">
                    <Icon name="AlertCircle" size={16} className="mt-0.5 mr-2 flex-shrink-0" />
                    <span>{error || authError}</span>
                  </div>
                )}

                <form onSubmit={handleSubmit} className="space-y-6">
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-2">Username</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <Icon name="User" size={18} className="text-slate-400" />
                      </div>
                      <input
                        type="text"
                        value={username}
                        onChange={(e) => setUsername(e.target.value)}
                        className="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                        placeholder="Enter your provided username"
                      />
                    </div>
                  </div>
                  
                  <button
                    type="submit"
                    className="w-full bg-blue-900 text-white font-medium py-3 px-4 rounded-xl hover:bg-blue-800 transition-colors shadow-md flex justify-center items-center"
                  >
                    Access Portal
                    <Icon name="ChevronRight" size={18} className="ml-2" />
                  </button>
                </form>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // ADMIN PORTAL
      // ==========================================
      function AdminPortal({ clients, globalSteps, certTemplate, onLogout, db }) {
        const [activeTab, setActiveTab] = useState('clients');

        return (
          <div className="min-h-screen flex flex-col md:flex-row h-screen">
            <div className="w-full md:w-64 flex-shrink-0 bg-blue-900 text-white flex flex-col shadow-xl z-10 md:h-screen sticky top-0">
              <div className="p-4 md:p-6 border-b border-blue-800 flex items-center justify-between md:justify-start">
                <div className="flex items-center">
                  <Icon name="GraduationCap" size={28} className="text-yellow-400 mr-3 shrink-0" />
                  <div>
                    <h2 className="font-bold text-lg leading-tight">Admin Portal</h2>
                    <p className="text-xs text-blue-300">IHS Enrollment</p>
                  </div>
                </div>
                <button onClick={onLogout} className="md:hidden text-red-300 hover:text-red-100 p-2">
                  <Icon name="LogOut" size={24} />
                </button>
              </div>
              
              <nav className="flex-row md:flex-col flex p-2 md:p-4 gap-2 overflow-x-auto no-scrollbar border-b border-blue-800 md:border-none">
                <button onClick={() => setActiveTab('clients')} className={`whitespace-nowrap flex items-center px-4 py-2.5 md:py-3 rounded-lg transition-colors ${activeTab === 'clients' ? 'bg-blue-800 text-white' : 'text-blue-200 hover:bg-blue-800/50'}`}>
                  <Icon name="Users" size={20} className="mr-2 md:mr-3" /> Manage Students
                </button>

                  <Icon name="Settings" size={20} className="mr-2 md:mr-3" /> Enrollment Steps

      // ==========================================
      // CERTIFICATE MODAL COMPONENT (PDF GEN)
      // ==========================================
      function CertificateModal({ client, certTemplate, onClose }) {
        const [grade, setGrade] = useState('');
        const [lrn, setLrn] = useState('');
        const [schoolYear, setSchoolYear] = useState('2026-2027');
        const [schoolLevel, setSchoolLevel] = useState('Junior High School');
        const [isGenerating, setIsGenerating] = useState(false);

        const conf = {
          depedLogo: null,
          schoolLogo: null,
          letterheadText: "Republic of the Philippines<br/>Department of Education<br/>Region V - Bicol<br/>Schools Division of Camarines Sur<br/>IRAYA HIGH SCHOOL",
          heading: "CERTIFICATE OF ENROLMENT",
          bodyContent: `<div style="text-indent: 40px; text-align: justify; margin-bottom: 15px;">This is to certify that {{STUDENT_NAME}} is officially enrolled as {{SCHOOL_LEVEL}} Grade {{GRADE}} with Learner Reference Number {{LRN}} in this institution this School Year {{SCHOOL_YEAR}}.</div><div style="text-indent: 40px; text-align: justify; margin-bottom: 15px;">This CERTIFICATION is issued upon the request of the aforementioned name for whatever legal purposes that may serve him/her under the law.</div><div style="text-indent: 40px; text-align: justify;">Given this {{DATE}} at Iraya High School, Iraya, Buhi, Camarines Sur.</div>`,
          signatoryName: "LALYN P. NEGRILLO",
          signatoryTitle: "Officer-In-charge",
          footer: "Not valid without School official seal",
          ...(certTemplate || {})
        };

        const executeGeneration = async (action) => {
          setIsGenerating(true);
          let container;
          
          // FIX 1: Open the preview window *immediately* on click to bypass aggressive mobile popup blockers
          let previewWindow = null;
          if (action === 'print') {
              previewWindow = window.open('', '_blank');
              if (!previewWindow) {
                  alert("Your browser blocked the preview window. Please allow popups or use the Download button.");
                  setIsGenerating(false);
                  return;
              }
              previewWindow.document.write('<html><head><title>Generating Certificate...</title><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;background:#f8fafc;color:#1e293b;text-align:center;"><h2>Generating your certificate, please wait...</h2></body></html>');
          }

          try {
            const replacePlaceholders = (text) => {
              if (!text) return "";
              const d = new Date();
              const day = d.getDate();
              const suffix = (day % 10 === 1 && day !== 11) ? 'st' : (day % 10 === 2 && day !== 12) ? 'nd' : (day % 10 === 3 && day !== 13) ? 'rd' : 'th';
              const month = d.toLocaleString('default', { month: 'long' });
              const year = d.getFullYear();
              const dateString = `${day}${suffix} day of ${month} ${year}`;
              const fallbackName = client?.name || 'Student Name';

              return text
                .replace(/{{STUDENT_NAME}}/g, `<strong>${fallbackName.toUpperCase()}</strong>`)
                .replace(/{{SCHOOL_LEVEL}}/g, schoolLevel)
                .replace(/{{GRADE}}/g, grade || '______')
                .replace(/{{LRN}}/g, lrn || '___________________')
                .replace(/{{SCHOOL_YEAR}}/g, schoolYear)
                .replace(/{{DATE}}/g, dateString);
            };

            const processedBody = replacePlaceholders(conf.bodyContent);
            const processedLetterhead = (conf.letterheadText || '').includes('<') 
              ? conf.letterheadText 
              : (conf.letterheadText || '').replace(/\n/g, '<br/>');

            container = document.createElement('div');
            
            // FIX 2: Place it exactly at the top of the document behind the modal overlay.
            // Pushing it to -10000px causes html2canvas to render a completely blank white image on mobile devices!
            container.style.position = 'absolute';
            container.style.top = '0';
            container.style.left = '0';
            container.style.zIndex = '-9999';
            // DO NOT use opacity or visibility modifiers here, or html2canvas will ignore the element completely.
            
            container.innerHTML = `
              <style>
                @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap');
                .pdf-wrapper { 
                    width: 210mm; 
                    min-height: 297mm; 
                    padding: 25.4mm; 
                    box-sizing: border-box; 
                    background-color: #ffffff;
                    font-family: 'Times New Roman', Times, serif; 
                    color: #000000;
                    position: relative;
                }
                .pdf-header { width: 100%; display: table; margin-bottom: 30px; }
                .pdf-header-cell { display: table-cell; vertical-align: top; }
                .pdf-logo { width: 85px; height: 85px; object-fit: contain; }
                .pdf-letterhead { text-align: center; font-size: 13px; line-height: 1.3; font-family: Arial, sans-serif; padding: 0 10px; }
                .pdf-heading { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 40px; font-family: 'Arial Black', Arial, sans-serif; }
                .pdf-body { line-height: 1.8; font-size: 16px; word-wrap: break-word; }
                .pdf-signatory { margin-top: 80px; text-align: right; width: 100%; display: inline-block; }
                .pdf-footer { position: absolute; bottom: 25.4mm; left: 25.4mm; font-size: 11px; font-style: italic; color: #555; }
              </style>
              <div class="pdf-wrapper">
                <div class="pdf-header">
                  <div class="pdf-header-cell" style="width: 85px;">
                    ${conf.depedLogo ? `<img src="${conf.depedLogo}" class="pdf-logo"/>` : ''}
                  </div>
                  <div class="pdf-header-cell pdf-letterhead">
                    ${processedLetterhead}
                  </div>
                  <div class="pdf-header-cell" style="width: 85px; text-align: right;">
                    ${conf.schoolLogo ? `<img src="${conf.schoolLogo}" class="pdf-logo"/>` : ''}
                  </div>
                </div>
                
                <div class="pdf-heading">${conf.heading}</div>
                
                <div class="pdf-body">${processedBody}</div>
                
                <div class="pdf-signatory">
                  <div style="font-weight: bold; font-size: 16px; margin-right: 20px;">${conf.signatoryName}</div>
                  <div style="font-size: 14px; margin-right: 20px;">${conf.signatoryTitle}</div>
                </div>
                
                <div class="pdf-footer">${conf.footer}</div>
              </div>
            `;

            document.body.appendChild(container);

            const fallbackName = client?.name || 'Student_Name';
            const filename = `Certificate_${fallbackName.replace(/\s+/g, '_')}.pdf`;
            const opt = {
              margin:       0,
              filename:     filename,
              image:        { type: 'jpeg', quality: 0.98 },
              html2canvas:  { 
                  scale: 2, 
                  useCORS: true, 
                  logging: false,
                  windowWidth: 794 // Crucial for mobile generation
              },
              jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // FIX 3: Force a tiny delay so the browser can fully render/paint the hidden div before canvas tries to snap it
            await new Promise(resolve => setTimeout(resolve, 250));

            const pdfWorker = window.html2pdf().set(opt).from(container);

            if (action === 'share') {
                // Feature for Android/iOS: Native Sharing via Email/Apps
                const pdfBlob = await pdfWorker.output('blob');
                const file = new File([pdfBlob], filename, { type: 'application/pdf' });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            title: 'Certificate of Enrollment',
                            text: `Attached is the Certificate of Enrollment for ${fallbackName}.`,
                            files: [file]
                        });
                    } catch (error) {
                        console.log('Error sharing or share was cancelled:', error);
                    }
                } else {
                    alert("Your browser/device does not support native file sharing. Initiating direct download instead.");
                    await pdfWorker.save();
                }
            } else if (action === 'download') {
                // FIX 4: Use html2pdf's native save method which is highly optimized for cross-device/mobile compatibility
                await pdfWorker.save();
            } else if (action === 'print') {
                await pdfWorker.toPdf().get('pdf').then((pdf) => {
                    pdf.autoPrint();
                    try {
                        const blobUrl = pdf.output('bloburl');
                        // Redirect the already-opened window to our newly generated PDF blob
                        if (previewWindow) previewWindow.location.href = blobUrl;
                    } catch(e) {
                         if (previewWindow) previewWindow.close();
                         alert("Previewing/Printing is restricted by your browser. Please Download or Share instead.");
                    }
                });
            }
            
            setIsGenerating(false);
            onClose();

          } catch (err) {
            console.error("Document Generation Error", err);
            if (previewWindow) previewWindow.close();
            alert("Error generating document. Check your console logs.");
            setIsGenerating(false);
          } finally {
            if (container && container.parentNode) {
              container.parentNode.removeChild(container);
            }
          }
        };

        return (
          <div className="fixed inset-0 z-50 bg-slate-900/60 flex items-center justify-center p-4 backdrop-blur-sm overflow-y-auto">
            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col my-8">
              <div className="px-4 py-3 sm:px-6 sm:py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                <h3 className="text-lg font-bold text-slate-800 flex items-center">
                  <Icon name="Award" size={20} className="mr-2 text-blue-600 shrink-0" /> 
                  Generate Certificate
                </h3>
                <button onClick={onClose} className="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-200 transition-colors">
                  <Icon name="X" size={20} />
                </button>
              </div>
              
              <div className="p-4 sm:p-6 space-y-4 sm:space-y-5">
                <div className="bg-blue-50 text-blue-800 text-xs sm:text-sm p-3 rounded-lg border border-blue-100 mb-2">
                  Preparing document for <strong className="font-bold">{client.name}</strong>. Fill in the specific details below to insert them into the template.
                </div>

                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-1">School Level</label>
                  <select value={schoolLevel} onChange={(e) => setSchoolLevel(e.target.value)} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                    <option value="Junior High School">Junior High School</option>
                    <option value="Senior High School">Senior High School</option>
                  </select>
                </div>

                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-1">Grade Level</label>
                  <input type="text" value={grade} onChange={(e) => setGrade(e.target.value)} placeholder="e.g. 10" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
                
                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-1">Learner Reference Number (LRN)</label>
                  <input type="text" value={lrn} onChange={(e) => setLrn(e.target.value)} placeholder="e.g. 123456789012" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>

                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-1">School Year</label>
                  <input type="text" value={schoolYear} onChange={(e) => setSchoolYear(e.target.value)} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
              </div>

              <div className="px-4 py-3 sm:px-6 sm:py-4 border-t border-slate-100 bg-slate-50 flex flex-wrap justify-end gap-2 sm:gap-3">
                <button onClick={onClose} disabled={isGenerating} className="w-full sm:w-auto px-4 py-2 text-slate-600 font-medium hover:bg-slate-200 rounded-lg transition-colors order-4 sm:order-1">
                  Cancel
                </button>
                <button onClick={() => executeGeneration('print')} disabled={isGenerating} className="w-full sm:w-auto px-4 py-2 bg-slate-700 text-white font-medium hover:bg-slate-800 rounded-lg transition-colors flex justify-center items-center shadow-sm disabled:opacity-50 order-3 sm:order-2">
                  <Icon name="Printer" size={18} className="mr-2" />
                </button>
                <button onClick={() => executeGeneration('download')} disabled={isGenerating} className="w-full sm:w-auto px-4 py-2 bg-slate-800 text-white font-medium hover:bg-slate-900 rounded-lg transition-colors flex justify-center items-center shadow-sm disabled:opacity-50 order-2 sm:order-3">
                  <Icon name="Download" size={18} className="mr-2" /> Download
                </button>
                <button onClick={() => executeGeneration('share')} disabled={isGenerating} className="w-full sm:w-auto px-4 py-2 bg-blue-600 text-white font-medium hover:bg-blue-700 rounded-lg transition-colors flex justify-center items-center shadow-sm disabled:opacity-50 order-1 sm:order-4">
                  <Icon name="Share" size={18} className="mr-2" /> Email / Share
                </button>
              </div>
            </div>
          </div>
        );
      }

      function AdminClients({ clients, globalSteps, certTemplate, db }) {
        const [newClientName, setNewClientName] = useState('');
        const [newClientUsername, setNewClientUsername] = useState('');
        const [expandedClient, setExpandedClient] = useState(null);
        const [certModalClient, setCertModalClient] = useState(null);
        const [error, setError] = useState('');
        const { addDoc, collection, updateDoc, doc, deleteDoc } = window.FirebaseAPI;

        const handleAddClient = async (e) => {
          e.preventDefault();
          setError('');
          if (!newClientName.trim() || !newClientUsername.trim()) { setError('Both Name and Username are required.'); return; }
          if (clients.some(c => c.username === newClientUsername.trim())) { setError('This username is already taken.'); return; }

          try {
            await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'enrollments'), {
              name: newClientName.trim(),
              username: newClientUsername.trim(),
              completedSteps: [],
              createdAt: Date.now()
            });
            setNewClientName('');
            setNewClientUsername('');
          } catch (err) {
            setError(`Failed to add client: ${err.message || 'Ensure connection is active.'}`);
          }
        };

        const toggleStepForClient = async (clientId, stepId, currentCompletedArray) => {
          const isCompleted = currentCompletedArray.includes(stepId);
          let newArray = [...currentCompletedArray];
          if (isCompleted) newArray = newArray.filter(id => id !== stepId);
          else newArray.push(stepId);

          try {
            await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'enrollments', clientId), { completedSteps: newArray });
          } catch (err) { console.error("Update error", err); }
        };

        const handleDeleteClient = async (clientId, e) => {
          e.stopPropagation();
          try {
            await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'enrollments', clientId));
          } catch (err) { console.error("Delete error", err); }
        }

        return (
          <div className="max-w-4xl mx-auto">
            {certModalClient && (
              <CertificateModal 
                client={certModalClient} 
                certTemplate={certTemplate} 
                onClose={() => setCertModalClient(null)} 
              />
            )}

            <div className="mb-8">
              <h2 className="text-2xl font-bold text-slate-800 mb-2">Student Directory</h2>
              <p className="text-slate-500">Manage client enrollments and track their specific progress.</p>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-6 mb-8">
              <h3 className="font-semibold text-lg text-slate-800 mb-4 flex items-center">
                <Icon name="Plus" size={20} className="mr-2 text-blue-600" /> Enroll New Student
              </h3>
              {error && <div className="mb-4 text-sm text-red-600 bg-red-50 p-3 rounded-lg">{error}</div>}
              
              <form onSubmit={handleAddClient} className="flex flex-col md:flex-row gap-3 sm:gap-4">
                <input type="text" placeholder="Full Name" value={newClientName} onChange={(e) => setNewClientName(e.target.value)} className="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                <input type="text" placeholder="Login Username" value={newClientUsername} onChange={(e) => setNewClientUsername(e.target.value)} className="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition-colors whitespace-nowrap">Create Record</button>
              </form>
            </div>

            <div className="space-y-4">
              {clients.length === 0 ? (
                <div className="text-center py-10 text-slate-500 bg-white rounded-xl border border-dashed border-slate-300">No students enrolled yet.</div>
              ) : (
                clients.map(client => {
                  const completedCount = globalSteps.filter(s => (client.completedSteps || []).includes(s.id)).length;
                  const progress = globalSteps.length === 0 ? 0 : Math.round((completedCount / globalSteps.length) * 100);
                  const isExpanded = expandedClient === client.id;

                  return (
                    <div key={client.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="p-4 sm:p-5 flex flex-col sm:flex-row sm:items-center justify-between cursor-pointer hover:bg-slate-50" onClick={() => setExpandedClient(isExpanded ? null : client.id)}>
                        <div className="flex-1 mb-4 sm:mb-0">
                          <h4 className="font-bold text-lg text-slate-800">{client.name}</h4>
                          <p className="text-sm text-slate-500">Username: <span className="font-mono bg-slate-100 px-1 py-0.5 rounded text-slate-700">{client.username}</span></p>
                        </div>
                        <div className="flex items-center gap-4 sm:gap-6 w-full sm:w-auto justify-between sm:justify-end">
                          <div className="text-left sm:text-right flex-1 sm:flex-none">
                            <div className="text-sm font-medium text-slate-600 mb-1">{progress}% Complete</div>
                            <div className="w-full sm:w-32 h-2 bg-slate-200 rounded-full overflow-hidden">
                              <div className="h-full bg-green-500 transition-all duration-500" style={{ width: `${progress}%` }} />
                            </div>
                          </div>
                          <div className="flex items-center gap-1 sm:gap-2">
                            <button onClick={(e) => { e.stopPropagation(); setCertModalClient(client); }} className="text-blue-600 hover:text-blue-800 p-2 rounded-full hover:bg-blue-50 transition-colors" title="Generate Certificate">
                              <Icon name="Award" size={24} />
                            </button>
                            <button onClick={(e) => handleDeleteClient(client.id, e)} className="text-slate-400 hover:text-red-500 p-2 rounded-full hover:bg-red-50 transition-colors" title="Delete Client">
                              <Icon name="Trash2" size={18} />
                            </button>
                          </div>
                        </div>
                      </div>

                      {isExpanded && (
                        <div className="border-t border-slate-100 bg-slate-50 p-4 sm:p-5">
                          <h5 className="text-sm font-semibold text-slate-600 mb-4 uppercase tracking-wider">Enrollment Checklist</h5>
                          <div className="space-y-2">
                            {globalSteps.map((step) => {
                              const isDone = (client.completedSteps || []).includes(step.id);
                              return (
                                <div key={step.id} onClick={() => toggleStepForClient(client.id, step.id, client.completedSteps || [])}
                                  className={`flex items-center p-3 rounded-lg cursor-pointer transition-colors border ${isDone ? 'bg-green-50 border-green-200' : 'bg-white border-slate-200 hover:border-blue-300'}`}>
                                  <div className="mr-4 text-slate-300 shrink-0">
                                    {isDone ? <Icon name="CheckCircle2" size={24} className="text-green-600" /> : <Icon name="Circle" size={24} />}
                                  </div>
                                  <span className={`font-medium ${isDone ? 'text-green-800 line-through opacity-70' : 'text-slate-700'}`}>{step.text}</span>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })
              )}
            </div>
          </div>
        );
      }

      function AdminSteps({ globalSteps, db }) {
        const [newStepText, setNewStepText] = useState('');
        const { setDoc, doc } = window.FirebaseAPI;

        const handleSaveSteps = async (newStepsArray) => {
          try { await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'global'), { steps: newStepsArray }); } 
          catch (err) { console.error("Error saving steps", err); }
        };

        const handleAddStep = (e) => {
          e.preventDefault();
          if (!newStepText.trim()) return;
          const newStep = { id: `step_${Date.now()}`, text: newStepText.trim() };
          handleSaveSteps([...globalSteps, newStep]);
          setNewStepText('');
        };

        return (
          <div className="max-w-3xl mx-auto">
            <div className="mb-8">
              <h2 className="text-2xl font-bold text-slate-800 mb-2">Configure Enrollment Steps</h2>
              <p className="text-slate-500">Define the global sequence of tasks that clients must complete.</p>
            </div>
            
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="p-4 sm:p-6">
                <ul className="space-y-3">
                  {globalSteps.map((step, index) => (
                    <li key={step.id} className="flex items-center justify-between p-3 sm:p-4 bg-slate-50 rounded-lg border border-slate-100 group">
                      <div className="flex items-center">
                        <span className="w-8 h-8 rounded-full bg-blue-100 text-blue-800 flex items-center justify-center font-bold text-sm mr-3 sm:mr-4 shrink-0">{index + 1}</span>
                        <span className="font-medium text-slate-700">{step.text}</span>
                      </div>
                      <button onClick={() => handleSaveSteps(globalSteps.filter(s => s.id !== step.id))} className="text-slate-400 hover:text-red-500 p-2 sm:opacity-0 group-hover:opacity-100 transition-all">
                        <Icon name="Trash2" size={18} />
                      </button>
                    </li>
                  ))}
                </ul>
              </div>

              <div className="bg-slate-50 border-t border-slate-200 p-4 sm:p-6">
                <form onSubmit={handleAddStep} className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 sm:gap-0">
                  <input type="text" value={newStepText} onChange={(e) => setNewStepText(e.target.value)} placeholder="e.g., Submit Birth Certificate" className="flex-1 px-4 py-3 border border-slate-300 rounded-lg sm:rounded-r-none sm:rounded-l-lg outline-none" />
                  <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-lg sm:rounded-l-none sm:rounded-r-lg flex items-center justify-center">
                    <Icon name="Plus" size={18} className="mr-2" /> Add Step
                  </button>
                </form>
              </div>
            </div>
          </div>
        );
      }

      function AdminCertificate({ certTemplate, db }) {
        const defaultConfig = {
          depedLogo: null,
          schoolLogo: null,
          letterheadText: `<div style="text-align: center;">Republic of the Philippines<br>Department of Education<br>Region V - Bicol<br>Schools Division of Camarines Sur<br><strong>IRAYA HIGH SCHOOL</strong></div>`,
          heading: "CERTIFICATE OF ENROLMENT",
          bodyContent: `<div style="text-indent: 40px; text-align: justify; margin-bottom: 15px;">This is to certify that {{STUDENT_NAME}} is officially enrolled as {{SCHOOL_LEVEL}} Grade {{GRADE}} with Learner Reference Number {{LRN}} in this institution this School Year {{SCHOOL_YEAR}}.</div><div style="text-indent: 40px; text-align: justify; margin-bottom: 15px;">This CERTIFICATION is issued upon the request of the aforementioned name for whatever legal purposes that may serve him/her under the law.</div><div style="text-indent: 40px; text-align: justify;">Given this {{DATE}} at Iraya High School, Iraya, Buhi, Camarines Sur.</div>`,
          signatoryName: "LALYN P. NEGRILLO",
          signatoryTitle: "Officer-In-charge",
          footer: "Not valid without School official seal"
        };

        let initialConfig = { ...defaultConfig, ...(certTemplate || {}) };
        if (certTemplate && certTemplate.paragraph1 && !certTemplate.bodyContent) {
           initialConfig.bodyContent = `<div style="text-indent: 40px; text-align: justify; margin-bottom: 15px;">${certTemplate.paragraph1}</div><div style="text-indent: 40px; text-align: justify; margin-bottom: 15px;">${certTemplate.paragraph2}</div><div style="text-indent: 40px; text-align: justify;">${certTemplate.paragraph3}</div>`;
        }
        
        if (initialConfig.letterheadText && !initialConfig.letterheadText.includes('<')) {
           initialConfig.letterheadText = `<div style="text-align: center;">${initialConfig.letterheadText.replace(/\n/g, '<br/>')}</div>`;
        }

        const [config, setConfig] = useState(initialConfig);
        const [isSaving, setIsSaving] = useState(false);
        const [message, setMessage] = useState({ text: '', type: '' });
        const { setDoc, doc } = window.FirebaseAPI;

        const handleChange = (key, value) => {
          setConfig(prev => ({ ...prev, [key]: value }));
        };

        const handleLogoUpload = (e, key) => {
          const file = e.target.files[0];
          if (!file) return;
          if (!file.type.match('image.*')) {
            setMessage({ text: 'Please upload an image file (PNG/JPG).', type: 'error' });
            return;
          }

          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new window.Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const maxWidth = 300; 
              const scale = Math.min(maxWidth / img.width, 1);
              canvas.width = img.width * scale;
              canvas.height = img.height * scale;
              
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              
              const compressedBase64 = canvas.toDataURL('image/png', 0.9);
              handleChange(key, compressedBase64);
              setMessage({ text: 'Logo added to preview. Click Save to deploy.', type: 'info' });
            };
          };
          reader.readAsDataURL(file);
        };

        const saveTemplate = async () => {
          setIsSaving(true);
          setMessage({ text: '', type: '' });
          try {
            await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'certificate'), { 
              ...config,
              updatedAt: Date.now()
            });
            setMessage({ text: 'Certificate configuration saved successfully!', type: 'success' });
          } catch (err) {
            setMessage({ text: 'Failed to save template. Please check connection.', type: 'error' });
          }
          setIsSaving(false);
        };

        return (
          <div className="max-w-6xl mx-auto pb-10">
            <div className="mb-8">
              <h2 className="text-2xl font-bold text-slate-800 mb-2">Certificate Builder</h2>
              <p className="text-slate-500">Fully customize the A4 certificate layout, letterhead, and text that will be generated for clients.</p>
            </div>

            {message.text && (
              <div className={`mb-6 p-4 rounded-xl flex items-start shadow-sm border ${
                message.type === 'error' ? 'bg-red-50 text-red-700 border-red-200' : 
                message.type === 'success' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-blue-50 text-blue-700 border-blue-200'
              }`}>
                <Icon name={message.type === 'error' ? 'AlertCircle' : 'CheckCircle2'} size={20} className="mr-3 mt-0.5" />
                <span className="font-medium">{message.text}</span>
              </div>
            )}

            <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
              
              <div className="space-y-6 bg-white p-4 sm:p-6 rounded-2xl border border-slate-200 shadow-sm h-fit">
                
                <h3 className="font-bold text-slate-800 text-lg border-b border-slate-100 pb-3 flex items-center">
                  <Icon name="Image" size={20} className="mr-2 text-blue-600" /> Letterhead Setup
                </h3>
                
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5 flex justify-between">
                      Left Logo (DepEd)
                      {config.depedLogo && <span onClick={()=>handleChange('depedLogo', null)} className="text-red-500 cursor-pointer hover:underline">Clear</span>}
                    </label>
                    <label className="flex items-center justify-center w-full h-16 border border-slate-300 border-dashed rounded-lg cursor-pointer bg-slate-50 hover:bg-slate-100">
                      {config.depedLogo ? <img src={config.depedLogo} className="h-10 object-contain"/> : <span className="text-xs text-slate-500">Upload Image</span>}
                      <input type="file" className="hidden" accept="image/*" onChange={(e)=>handleLogoUpload(e, 'depedLogo')} />
                    </label>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5 flex justify-between">
                      Right Logo (School)
                      {config.schoolLogo && <span onClick={()=>handleChange('schoolLogo', null)} className="text-red-500 cursor-pointer hover:underline">Clear</span>}
                    </label>
                    <label className="flex items-center justify-center w-full h-16 border border-slate-300 border-dashed rounded-lg cursor-pointer bg-slate-50 hover:bg-slate-100">
                      {config.schoolLogo ? <img src={config.schoolLogo} className="h-10 object-contain"/> : <span className="text-xs text-slate-500">Upload Image</span>}
                      <input type="file" className="hidden" accept="image/*" onChange={(e)=>handleLogoUpload(e, 'schoolLogo')} />
                    </label>
                  </div>
                </div>

                <div className="mt-6 w-full">
                  <label className="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Letterhead Text</label>
                  <RichTextEditor value={config.letterheadText} onChange={(val) => handleChange('letterheadText', val)} />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5 mt-6">Certificate Heading</label>
                  <input type="text" value={config.heading} onChange={e=>handleChange('heading', e.target.value)} className="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-lg font-bold text-center font-sans" />
                </div>

                <h3 className="font-bold text-slate-800 text-lg border-b border-slate-100 pb-3 flex items-center mt-8">
                  <Icon name="BookOpen" size={20} className="mr-2 text-blue-600" /> Rich Text Body
                </h3>

                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 text-sm text-slate-700">
                  <span className="font-bold text-slate-800 mb-2 block">Smart Tags (Copy & Paste into the editor below):</span>
                  <div className="flex flex-wrap gap-2">
                    {['{{STUDENT_NAME}}', '{{SCHOOL_LEVEL}}', '{{GRADE}}', '{{LRN}}', '{{SCHOOL_YEAR}}', '{{DATE}}'].map(tag => (
                      <span key={tag} className="font-mono text-xs bg-white border border-slate-300 px-2 py-1 rounded text-blue-700 font-semibold cursor-pointer hover:bg-blue-50" title="Copy to clipboard" onClick={() => {navigator.clipboard.writeText(tag); alert(`Copied ${tag}`);}}>{tag}</span>
                    ))}
                  </div>
                </div>

                <div className="w-full">
                  <label className="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5 mt-2">Certificate Paragraphs</label>
                  <RichTextEditor value={config.bodyContent} onChange={(val) => handleChange('bodyContent', val)} />
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                  <div>
                    <label className="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Signatory Name</label>
                    <input type="text" value={config.signatoryName} onChange={e=>handleChange('signatoryName', e.target.value)} className="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm font-semibold text-left sm:text-right" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Signatory Title</label>
                    <input type="text" value={config.signatoryTitle} onChange={e=>handleChange('signatoryTitle', e.target.value)} className="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm text-left sm:text-right" />
                  </div>
                </div>
                
                <div>
                  <label className="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5 mt-2">Footer Text</label>
                  <input type="text" value={config.footer} onChange={e=>handleChange('footer', e.target.value)} className="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm italic" />
                </div>

                <div className="pt-4 border-t border-slate-100 flex justify-end">
                  <button onClick={saveTemplate} disabled={isSaving} className={`w-full sm:w-auto flex justify-center items-center px-6 py-3 rounded-xl text-white font-medium transition-all ${isSaving ? 'bg-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 shadow-md hover:shadow-lg'}`}>
                    {isSaving ? 'Saving to Database...' : 'Save Configuration'}
                  </button>
                </div>
              </div>

              <div className="space-y-6">
                <div className="xl:sticky xl:top-6">
                  <h4 className="text-sm font-bold text-slate-600 uppercase tracking-wider mb-3 px-2 flex justify-between items-end">
                    Approximate A4 Visual Layout
                  </h4>
                  <div className="border border-slate-300 rounded-lg overflow-hidden bg-white relative shadow-md w-full max-w-[420px] mx-auto aspect-[1/1.414]">
                    
                    <div className="absolute inset-0 flex flex-col p-4 sm:p-6 text-slate-800 font-serif box-border pointer-events-none pb-12 relative overflow-hidden">
                      
                      <div className="flex justify-between items-start mb-4 w-full shrink-0">
                        <div className="w-[12%] aspect-square flex items-center justify-center">
                          {config.depedLogo && <img src={config.depedLogo} className="w-full h-full object-contain" />}
                        </div>
                        
                        <div 
                          className="flex-1 flex flex-col font-sans px-2 text-[8px] sm:text-[10px]" 
                          style={{lineHeight: '1.2'}}
                          dangerouslySetInnerHTML={{ __html: config.letterheadText }} 
                        />
                        
                        <div className="w-[12%] aspect-square flex items-center justify-center">
                          {config.schoolLogo && <img src={config.schoolLogo} className="w-full h-full object-contain" />}
                        </div>
                      </div>

                      <div className="font-bold text-center mb-4 font-sans shrink-0 text-sm sm:text-base">{config.heading}</div>
                      
                      <div 
                        className="leading-relaxed mb-4 word-wrap text-[9px] sm:text-[11px]" 
                        dangerouslySetInnerHTML={{ __html: config.bodyContent.replace(/{{.*?}}/g, '_______') }}
                      />
                      
                      <div className="mt-8 self-end text-right pb-4 mr-2 sm:mr-4">
                        <div className="font-bold text-[9px] sm:text-[11px]">{config.signatoryName}</div>
                        <div className="text-[7px] sm:text-[9px]">{config.signatoryTitle}</div>
                      </div>

                      <div className="absolute bottom-4 sm:bottom-6 left-4 sm:left-6 italic text-slate-500 text-[6px] sm:text-[8px]">
                        {config.footer}
                      </div>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        );
      }

      // ==========================================
      // CLIENT PORTAL
      // ==========================================
      function ClientPortal({ client, globalSteps, onLogout }) {
        if (!client) return null;
        const completedSet = new Set(client.completedSteps || []);
        
        let nextStepIndex = globalSteps.findIndex(step => !completedSet.has(step.id));
        if (nextStepIndex === -1 && globalSteps.length > 0) nextStepIndex = globalSteps.length; 

        return (
          <div className="min-h-screen bg-slate-50">
            <header className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
              <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div className="flex items-center">
                  <div className="bg-blue-900 p-1.5 rounded-lg mr-3 shadow-sm">
                    <Icon name="GraduationCap" size={22} className="text-yellow-400" />
                  </div>
                  <h1 className="font-bold text-xl text-slate-800 tracking-tight truncate">IHS Tracker</h1>
                </div>
                <div className="flex items-center gap-2 sm:gap-4">
                  <div className="hidden sm:block text-right">
                    <div className="text-xs text-slate-500 uppercase tracking-wider font-semibold">Student</div>
                    <div className="text-sm font-bold text-slate-800">{client.name}</div>
                  </div>
                  <button onClick={onLogout} className="text-slate-500 hover:text-slate-800 p-2 rounded-full hover:bg-slate-100">
                    <Icon name="LogOut" size={20} />
                  </button>
                </div>
              </div>
            </header>

            <main className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
              <div className="mb-10 text-center">
                <h2 className="text-3xl md:text-4xl font-extrabold text-blue-900 mb-4">Welcome back, {client.name.split(' ')[0]}!</h2>
                <p className="text-base sm:text-lg text-slate-600 max-w-2xl mx-auto">Track your enrollment progress here. Your status is updated automatically when the administration processes a step.</p>
              </div>

              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 mb-10">
                <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                  <div className="flex-1 w-full">
                    <div className="flex justify-between text-sm font-semibold mb-2">
                      <span className="text-slate-600">Overall Progress</span>
                      <span className="text-blue-700">{completedSet.size} of {globalSteps.length} Steps</span>
                    </div>
                    <div className="w-full h-4 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                      <div className="h-full bg-gradient-to-r from-blue-500 to-blue-600 rounded-full transition-all duration-1000 relative" style={{ width: `${globalSteps.length === 0 ? 0 : Math.round((completedSet.size / globalSteps.length) * 100)}%` }}>
                        <div className="absolute top-0 right-0 bottom-0 left-0 bg-white/20 w-full animate-shimmer"></div>
                      </div>
                    </div>
                  </div>
                  
                  {nextStepIndex === globalSteps.length && globalSteps.length > 0 ? (
                    <div className="shrink-0 bg-green-100 text-green-800 px-6 py-3 rounded-xl font-bold flex items-center border border-green-200 w-full sm:w-auto justify-center">
                      <Icon name="CheckCircle2" size={20} className="mr-2" /> Complete!
                    </div>
                  ) : (
                    <div className="shrink-0 text-center px-6 py-3 bg-blue-50 rounded-xl border border-blue-100 w-full md:w-auto">
                      <div className="text-xs text-blue-600 font-bold uppercase tracking-wider mb-1">Status</div>
                      <div className="font-semibold text-blue-900">In Progress</div>
                    </div>
                  )}
                </div>
              </div>

              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                <h3 className="font-bold text-xl text-slate-800 mb-8 flex items-center">Your Action Plan</h3>
                
                <div className="relative">
                  {globalSteps.length > 0 && <div className="absolute left-6 md:left-8 top-8 bottom-8 w-1 bg-slate-100 rounded-full z-0"></div>}
                  
                  <div className="space-y-8 relative z-10">
                    {globalSteps.map((step, index) => {
                      const isCompleted = completedSet.has(step.id);
                      const isCurrent = index === nextStepIndex;

                      return (
                        <div key={step.id} className="flex relative">
                          <div className="shrink-0 w-12 md:w-16 flex flex-col items-center">
                            <div className={`w-12 h-12 rounded-full border-4 flex items-center justify-center transition-colors bg-white
                              ${isCompleted ? 'border-green-500 text-green-500' : isCurrent ? 'border-blue-600 text-blue-600' : 'border-slate-300 text-slate-300'}`}>
                              {isCompleted ? <Icon name="CheckCircle2" size={24} /> : <span className="font-bold">{index + 1}</span>}
                            </div>
                            {index !== globalSteps.length - 1 && (
                              <div className={`w-1 flex-1 my-2 rounded ${isCompleted ? 'bg-green-500' : 'bg-slate-200'}`}></div>
                            )}
                          </div>
                          <div className="ml-4 md:ml-6 pb-8 pt-2">
                            <h4 className={`text-lg font-bold ${isCompleted ? 'text-green-800' : isCurrent ? 'text-blue-900' : 'text-slate-600'}`}>
                              {step.text}
                            </h4>
                            <p className="text-slate-500 mt-1 text-sm">
                              {isCompleted ? 'Step completed' : isCurrent ? 'In progress' : 'Pending previous steps'}
                            </p>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </main>
          </div>
        );
      }

      // Root Render Initialization
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<AppWrapper />);
    </script>
  </body>
</html>
